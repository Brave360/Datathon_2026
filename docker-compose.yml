services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      LISTINGS_RAW_DATA_DIR: /app/raw_data
      LISTINGS_DB_PATH: /data/listings.db
      LISTINGS_ALLOW_ALL_CORS: "true"
      CHROMA_DB_PATH: /data/chroma
    volumes:
      - ./data:/data
  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    env_file:
      - .env
    environment:
      APPS_SDK_LISTINGS_API_BASE_URL: http://api:8000
      APPS_SDK_PUBLIC_BASE_URL: http://localhost:8001
      APPS_SDK_PORT: 8001
      LISTINGS_RAW_DATA_DIR: /app/raw_data
      LISTINGS_DB_PATH: /data/listings.db
    ports:
      - "8001:8001"
    depends_on:
      - api
    volumes:
      - ./data:/data
  frontend:
    build:
      context: .
      dockerfile: apps_sdk/web/Dockerfile
    ports:
      - "8081:8080"
    depends_on:
      - api
